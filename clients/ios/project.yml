name: TmuxRemote
options:
  bundleIdPrefix: com.nabto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"
targets:
  TmuxRemote:
    type: application
    platform: iOS
    configFiles:
      Debug: Debug.xcconfig
      Release: Release.xcconfig
    sources:
      - TmuxRemote
    dependencies:
      - package: SwiftTerm
    settings:
      INFOPLIST_FILE: TmuxRemote/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.nabto.TmuxRemote
      TARGETED_DEVICE_FAMILY: "1,2"
      CODE_SIGN_STYLE: Automatic
  TmuxRemoteTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: TestsDebug.xcconfig
      Release: TestsRelease.xcconfig
    sources:
      - TmuxRemoteTests
    dependencies:
      - target: TmuxRemote
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nabto.TmuxRemoteTests
      GENERATE_INFOPLIST_FILE: YES
  TmuxRemoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - TmuxRemoteUITests
    dependencies:
      - target: TmuxRemote
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nabto.TmuxRemoteUITests
      GENERATE_INFOPLIST_FILE: YES
